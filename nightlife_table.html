<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightlife | ZomaClone</title>
    <link rel="icon" type="image/png" sizes="512x512" href="Images/logo_512.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 35, 0.85);
            --accent-primary: #8b5cf6;
            --accent-secondary: #a855f7;
            --accent-neon: #22d3ee;
            --accent-pink: #ec4899;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }

        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 100; padding: 16px 24px; }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-pink)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .logo-text { font-weight: 700; font-size: 22px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-secondary); }
        .toggle-switch { width: 50px; height: 26px; background: var(--glass-border); border-radius: 13px; position: relative; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: var(--accent-primary); border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        body.light-mode .toggle-switch { background: var(--accent-neon); }
        body.light-mode .toggle-switch::after { left: 27px; }

        .main-content { padding: 100px 24px 60px; max-width: 1400px; margin: 0 auto; }

        .hero { text-align: center; padding: 60px 0; }
        .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; background: linear-gradient(135deg, var(--text-primary), var(--accent-neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 18px; color: var(--text-secondary); }

        .clubs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .club-card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .club-card:hover { transform: translateY(-8px); border-color: var(--accent-primary); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2); }
        .club-banner { width: 100%; height: 180px; object-fit: cover; }
        .club-info { padding: 20px; }
        .club-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .club-location { color: var(--text-secondary); font-size: 14px; display: flex; align-items: center; gap: 6px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 24px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-banner { width: 100%; height: 200px; object-fit: cover; }
        .modal-content { padding: 24px; }
        .modal-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; }
        .modal-title { font-size: 28px; font-weight: 700; }
        .modal-close { width: 40px; height: 40px; background: var(--glass-border); border: none; border-radius: 50%; color: var(--text-secondary); cursor: pointer; font-size: 18px; }
        .modal-close:hover { background: var(--danger); color: white; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 15px; font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--accent-primary); }

        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 20px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; background: rgba(255, 255, 255, 0.05); border: 1px solid transparent; }
        .calendar-day:hover:not(.disabled) { border-color: var(--accent-primary); }
        .calendar-day.selected { background: var(--accent-primary); color: white; }
        .calendar-day.disabled { opacity: 0.3; cursor: not-allowed; }
        .calendar-day-header { background: none; font-weight: 600; color: var(--text-secondary); cursor: default; }

        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .slot-btn { padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-primary); cursor: pointer; transition: all 0.2s; text-align: center; }
        .slot-btn:hover { border-color: var(--accent-primary); }
        .slot-btn.selected { background: var(--accent-primary); border-color: var(--accent-primary); }

        .table-types-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .table-type-card { padding: 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .table-type-card:hover { border-color: var(--accent-primary); }
        .table-type-card.selected { border-color: var(--accent-primary); background: rgba(139, 92, 246, 0.1); }
        .table-type-name { font-weight: 600; margin-bottom: 4px; }
        .table-type-price { color: var(--accent-neon); font-size: 18px; font-weight: 700; }
        .table-type-info { font-size: 12px; color: var(--text-secondary); }

        .total-price { font-size: 24px; font-weight: 700; text-align: center; margin: 20px 0; color: var(--accent-neon); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(139, 92, 246, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .toast { position: fixed; top: 100px; right: 24px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; z-index: 2000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .success-animation { text-align: center; padding: 40px; }
        .success-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--success), var(--accent-neon)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; animation: successPop 0.5s ease; }
        @keyframes successPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* Light mode */
        body.light-mode { background: #f5f5f7; color: #1a1a2e; }
        body.light-mode::before { background: linear-gradient(ellipse at 30% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%); }
        body.light-mode .header { background: rgba(255, 255, 255, 0.9); }
        body.light-mode .bg-card { background: white; }
        body.light-mode .club-card { background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        body.light-mode .form-input { background: #f5f5f7; border-color: #e0e0e0; color: #1a1a2e; }
        body.light-mode .modal { background: white; }
        .calendar-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:12px;
        font-weight:600;
        }

        .calendar-grid{
        display:grid;
        grid-template-columns:repeat(7,1fr);
        gap:8px;
        }

        .calendar-day.disabled{
        opacity:0.3;
        pointer-events:none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo" onclick="location.reload()">
                <div class="logo-icon">Z</div>
                <span class="logo-text">ZomaClone</span>
            </a>
            <div class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <div class="toggle-switch"></div>
                <i class="fas fa-sun"></i>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="hero">
            <h1>Nightlife Experiences</h1>
            <p>Book your table at the best clubs and lounges in town</p>
        </div>
        <div class="clubs-grid" id="clubsGrid">
            <div style="text-align: center; padding: 60px; color: var(--text-secondary);">
                <i class="fas fa-spinner fa-spin" style="font-size: 40px; margin-bottom: 16px;"></i>
                <p>Loading clubs...</p>
            </div>
        </div>
    </main>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal">
            <img class="modal-banner" id="modalBanner" src="" alt="Club Banner">
            <div class="modal-content" id="modalContent">
                <div class="modal-header">
                    <div>
                        <h2 class="modal-title" id="modalTitle">Club Name</h2>
                        <p style="color: var(--text-secondary);" id="modalLocation"><i class="fas fa-map-marker-alt"></i> Location</p>
                    </div>
                    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>

                <div id="bookingForm">
                    <div class="form-group">
                        <label class="form-label">Select Date</label>
                        <div class="calendar" id="calendar"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Select Time Slot</label>
                        <div class="slots-grid" id="slotsGrid"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Select Table Type</label>
                        <div class="table-types-grid" id="tableTypesGrid"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Your Name</label>
                        <input type="text" class="form-input" id="customerName" placeholder="Enter your name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-input" id="customerPhone" placeholder="Enter phone number">
                    </div>

                    <div class="total-price" id="totalPrice">Total: ₹0</div>
                    <button class="btn btn-primary" id="bookBtn" onclick="submitBooking()">
                        <i class="fas fa-check"></i> Confirm Booking
                    </button>
                </div>

                <div class="success-animation" id="successAnimation" style="display: none;">
                    <div class="success-icon"><i class="fas fa-check"></i></div>
                    <h2>Booking Confirmed!</h2>
                    <p style="color: var(--text-secondary); margin-top: 10px;">Your booking ID: <strong id="bookingId"></strong></p>
                    <p style="color: var(--text-secondary); margin-top: 20px;">Thank you for choosing us!</p>
                    <button class="btn btn-primary" style="margin-top: 30px;" onclick="closeModal()">Book Another</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" style="display: none;"></div>

    <script>
        // ============================================================
        // DOM HELPERS - Defined FIRST
        // ============================================================
        function q(sel, root = document) {
            return root.querySelector(sel);
        }

        function qa(sel, root = document) {
            return Array.from(root.querySelectorAll(sel));
        }

        // ============================================================
        // CONFIG & STATE
        // ============================================================
        const API_BASE = window.location.origin;
        let selectedVendor = null;
        let selectedDate = null;
        let selectedSlot = null;
        let selectedTableType = null;
        let currentSlots = [];
        let currentTableTypes = [];

        // ============================================================
        // TOAST & THEME
        // ============================================================
        function showToast(message, type = 'success') {
            const toast = q('#toast');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="toast-icon"><i class="fas fa-${type === 'success' ? 'check' : 'times'}"></i></div><span>${message}</span>`;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // ============================================================
        // API LAYER
        // ============================================================
        async function apiGet(endpoint) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                if (!res.ok) throw new Error(`Server error: ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error('API Error:', err);
                alert('Backend not running on port 5000');
                throw err;
            }
        }

        async function apiPost(endpoint, data) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error(`Server error: ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error('API Error:', err);
                alert('Backend not running on port 5000');
                throw err;
            }
        }

        // ============================================================
        // BANNER PATH HELPER
        // ============================================================
        function getBannerUrl(bannerPath) {
            if (!bannerPath) return 'Images/club.webp';
            if (bannerPath.startsWith('http')) return bannerPath;
            // Prefix with API_BASE for local paths like /uploads/...
            return `${API_BASE}${bannerPath}`;
        }

        // ============================================================
        // LOAD CLUBS
        // ============================================================
        async function loadClubs() {
            try {
                const data = await apiGet('/api/nightlife/clubs');
                const grid = q('#clubsGrid');
                if (!data.success || !data.clubs || data.clubs.length === 0) {
                    grid.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-secondary);"><i class="fas fa-info-circle" style="font-size: 40px; margin-bottom: 16px;"></i><p>No clubs available</p></div>';
                    return;
                }
                grid.innerHTML = data.clubs.map(club => `
                    <div class="club-card" onclick="window.openBooking(${club.id})">
                        <img class="club-banner" src="${getBannerUrl(club.banner)}" alt="${club.name}" onerror="this.src='Images/club.webp'">
                        <div class="club-info">
                            <h3 class="club-name">${club.name}</h3>
                            <p class="club-location"><i class="fas fa-map-marker-alt"></i> ${club.city || 'Location'}, ${club.state || ''}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) { 
                q('#clubsGrid').innerHTML = '<div style="text-align: center; padding: 60px; color: var(--danger);">Failed to load clubs. Make sure backend is running on port 5000.</div>'; 
            }
        }

        // ============================================================
        // OPEN BOOKING MODAL
        // ============================================================
        window.openBooking = async function(vendorId) {
            try {
                const data = await apiGet(`/api/nightlife/clubs/${vendorId}/details`);
                if (!data.success) { showToast('Failed to load club details', 'error'); return; }
                selectedVendor = data;
                q('#modalBanner').src = getBannerUrl(data.vendor.banner);
                q('#modalTitle').textContent = data.vendor.name;
                q('#modalLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${data.vendor.city}, ${data.vendor.state}`;
                console.log("API DETAILS RESPONSE:", data);

                currentSlots = data.slots || data.data?.slots || [];
                currentTableTypes = data.tableTypes || data.data?.tableTypes || [];
                renderCalendar(data.vendor.maxAdvanceDays || 30);
                renderSlots();
                renderTableTypes();
                q('#bookingForm').style.display = 'block';
                q('#successAnimation').style.display = 'none';
                q('#bookingModal').classList.add('active');
            } catch (err) { showToast('Error loading details', 'error'); }
        };

        // ============================================================
        // CLOSE MODAL
        // ============================================================
        window.closeModal = function() {
            q('#bookingModal').classList.remove('active');
            selectedDate = null; selectedSlot = null; selectedTableType = null;
        };

        // ============================================================
        // CALENDAR
        // ============================================================
        let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function renderCalendar(maxDays){

    const calendar = q('#calendar');
    const today = new Date();

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    const monthNames = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    let html = `
        <div class="calendar-header">
            <button onclick="prevMonth()">◀</button>
            <span>${monthNames[currentMonth]} ${currentYear}</span>
            <button onclick="nextMonth()">▶</button>
        </div>

        <div class="calendar-grid">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
    `;

    // empty spaces before first day
    for(let i=0;i<firstDay;i++){
        html += `<div></div>`;
    }

    // actual days
    for(let day=1; day<=daysInMonth; day++){

        const dateObj = new Date(currentYear, currentMonth, day);

        const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

        const isPast = dateObj < new Date(today.getFullYear(), today.getMonth(), today.getDate());

        html += `
            <div class="calendar-day ${isPast ? 'disabled' : ''}"
                 ${!isPast ? `onclick="selectDate('${dateStr}', this)"` : ''}>
                 ${day}
            </div>
        `;
    }

    html += `</div>`;

    calendar.innerHTML = html;
}
function prevMonth(){

    currentMonth--;

    if(currentMonth < 0){
        currentMonth = 11;
        currentYear--;
    }

    renderCalendar();
}

function nextMonth(){

    currentMonth++;

    if(currentMonth > 11){
        currentMonth = 0;
        currentYear++;
    }

    renderCalendar();
}

        window.selectDate = function(dateStr, el) {
            qa('.calendar-day.selected').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            selectedDate = dateStr;
            updateTotal();
        };
         function formatTime(timeStr){

    if(!timeStr) return "";

    const [h,m] = timeStr.split(":");
    let hour = parseInt(h);

    const ampm = hour >= 12 ? "PM" : "AM";
    hour = hour % 12 || 12;

    return `${hour}:${m} ${ampm}`;
}
        // ============================================================
        // SLOTS
        // ============================================================
        function renderSlots() {

    const grid = q('#slotsGrid');

    console.log("Slots received:", currentSlots);

    if (!currentSlots || currentSlots.length === 0) {
        grid.innerHTML = '<p style="color: var(--text-secondary);">No slots available</p>';
        return;
    }

    grid.innerHTML = currentSlots.map(slot => {

        const start = slot.start || slot.start_time;
        const end = slot.end || slot.end_time;

        return `
        <div class="slot-btn" data-id="${slot.id}">
            ${slot.name || "Slot"}
            <br>
            <small>${formatTime(start)} - ${formatTime(end)}</small>
        </div>
        `;

    }).join('');

    qa(".slot-btn").forEach(btn=>{
        btn.onclick = function(){
            qa(".slot-btn.selected").forEach(b=>b.classList.remove("selected"));
            this.classList.add("selected");
            selectedSlot = this.dataset.id;
            updateTotal();
        }
    });

}

        window.selectSlot = function(id, el) {
            qa('.slot-btn.selected').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            selectedSlot = id;
            updateTotal();
        };

        // ============================================================
        // TABLE TYPES
        // ============================================================
        function renderTableTypes() {
            const grid = q('#tableTypesGrid');
            if (!currentTableTypes.length) { grid.innerHTML = '<p style="color: var(--text-secondary);">No tables available</p>'; return; }
            grid.innerHTML = currentTableTypes.map(t => `
                <div class="table-type-card" onclick="window.selectTableType(${t.id}, ${t.price}, '${t.name}', this)">
                    <div class="table-type-name">${t.name}</div>
                    <div class="table-type-price">₹${t.price}</div>
                    <div class="table-type-info">${t.seats} seats | ${(t.freeTables ?? t.freeCount ?? 0)} free</div>
                </div>
            `).join('');
        }

        window.selectTableType = function(id, price, name, el) {
            qa('.table-type-card.selected').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selectedTableType = { id, price, name };
            updateTotal();
        };

        // ============================================================
        // TOTAL & SUBMIT
        // ============================================================
        function updateTotal() {
            const price = selectedTableType ? selectedTableType.price : 0;
            q('#totalPrice').textContent = `Total: ₹${price.toLocaleString()}`;
            const btn = q('#bookBtn');
            btn.disabled = !selectedDate || !selectedSlot || !selectedTableType;
        }

        window.submitBooking = async function() {
            const name = q('#customerName').value.trim();
            const phone = q('#customerPhone').value.trim();
            if (!name || !phone) { showToast('Please fill all fields', 'error'); return; }
            if (!selectedDate || !selectedSlot || !selectedTableType) { showToast('Please complete all selections', 'error'); return; }

            try {
                const data = await apiPost(`/api/nightlife/bookings?vendor_id=${selectedVendor.vendor.id}`, {
                    customer: name,
                    phone: phone,
                    date: selectedDate,
                    slot_id: selectedSlot,
                    table_type_id: selectedTableType.id,
                    table_numbers: '1',
                    price: selectedTableType.price
                });

                if (data.success) {
                    q('#bookingId').textContent = data.booking.booking_id;
                    document.querySelector("#successAnimation h2").innerText =
                        `Booking Confirmed, ${data.booking.customer}!`;
                    q('#bookingForm').style.display = 'none';
                    q('#successAnimation').style.display = 'block';
                } else {
                    showToast(data.message || 'Booking failed', 'error');
                }
            } catch (err) { showToast('Error submitting booking', 'error'); }
        };

        // ============================================================
        // INIT ON DOM READY
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadClubs();
        });
    </script>
</body>
</html>
