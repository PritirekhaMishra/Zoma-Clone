<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Online - Nightlife | ZomaClone</title>
  <link rel="icon" type="image/png" sizes="512x512" href="Images/logo_512.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
  <script src="theme.js" defer></script>
  <style>
    :root {
      --bg: #050816;
      --card: #0f172a;
      --accent: #7c3aed;
      --hover: #9333ea;
      --text: #ffffff;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.06);
      --glass: rgba(5, 8, 22, 0.8);
      --shadow: 0 10px 40px rgba(0,0,0,0.3);
      --shadow-hover: 0 20px 40px rgba(0,0,0,0.4);
      --radius: 18px;
      --radius-sm: 12px;
      --transition: 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Hero Section */
    .hero {
      position: relative;
      background: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=1920') center/cover no-repeat;
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 22, 0.8);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
      max-width: 700px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 30px;
      font-size: 14px;
      color: #a78bfa;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 16px;
      color: var(--muted);
    }

    /* Search Bar */
    .search-container {
      max-width: 600px;
      margin: -25px auto 40px;
      padding: 0 20px;
      position: relative;
      z-index: 3;
    }

    .search-box {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      box-shadow: var(--shadow);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 18px;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }

    .search-box input::placeholder {
      color: var(--muted);
    }

    .search-box button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .search-box button:hover {
      background: var(--hover);
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 40px 80px;
    }

    /* Section */
    .section-header {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(124, 58, 237, 0.3);
    }

    .card-image {
      position: relative;
      height: 180px;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-open {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .badge-busy {
      background: rgba(251, 191, 36, 0.2);
      color: #f59e0b;
    }

    .card-rating {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .card-content {
      padding: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      background: var(--card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      color: var(--muted);
    }

    .empty-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .empty-desc {
      color: var(--muted);
      font-size: 14px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        min-height: 40vh;
      }

      .hero-title {
        font-size: 32px;
      }

      .container {
        padding: 20px 20px 60px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-badge">
        <i class="fas fa-glass-cheers"></i>
        <span>Order from Clubs</span>
      </div>
      <h1 class="hero-title">Food & Drinks</h1>
      <p class="hero-subtitle">Order your favorite food and drinks from top clubs</p>
    </div>
  </section>

  <!-- Search -->
  <div class="search-container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search clubs or venues...">
      <button onclick="filterClubs()">
        <i class="fas fa-search"></i> Search
      </button>
    </div>
  </div>

  <!-- Clubs Grid -->
  <main class="container">
    <div class="section-header">
      <h2 class="section-title">Popular Clubs</h2>
    </div>

    <div id="loadingState" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading clubs...
    </div>

    <div id="clubsGrid" class="grid"></div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-icon">
        <i class="fas fa-map-slash"></i>
      </div>
      <h3 class="empty-title">No Clubs Found</h3>
      <p class="empty-desc">Try a different search term</p>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    let allClubs = [];

    async function loadClubs() {
      const loadingState = document.getElementById('loadingState');
      const grid = document.getElementById('clubsGrid');
      const emptyState = document.getElementById('emptyState');

      try {
        // Load nightlife venues from the new API endpoint
        let res = await fetch(`${API_BASE}/api/nightlife/restaurants`);
        let data = [];
        
        if (res.ok) {
          const response = await res.json();
          // Handle both array response and object with data property
          data = Array.isArray(response) ? response : (response.data || response.restaurants || []);
        }

        // If no nightlife venues, try the clubs endpoint as fallback
        if (!data || data.length === 0) {
          res = await fetch(`${API_BASE}/api/nightlife/clubs`);
          if (res.ok) {
            const response = await res.json();
            data = response.clubs || [];
          }
        }

        // Transform data to match expected format for rendering
        allClubs = data.map(r => ({
          club_id: r.id,
          club_name: r.name,
          location: r.city || r.address || '',
          description: r.description || '',
          image: r.banner || r.image || null,
          rating: r.rating || 4.5,
          status: 'open'
        }));

        loadingState.style.display = 'none';
        renderClubs(allClubs);

      } catch (e) {
        console.error(e);
        loadingState.style.display = 'none';
        allClubs = [];
        renderClubs(allClubs);
      }
    }

    function renderClubs(clubs) {
      const grid = document.getElementById('clubsGrid');
      const emptyState = document.getElementById('emptyState');

      if (!clubs || clubs.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = clubs.map(club => {
        const statusClass = club.status === 'open' ? 'badge-open' : 'badge-busy';
        const statusText = club.status === 'open' ? 'OPEN' : 'BUSY';
        
        return `
          <div class="card" onclick="openClub(${club.club_id})">
            <div class="card-image">
              <img src="${club.image || 'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=400'}" alt="${club.club_name}">
              <span class="card-badge ${statusClass}">
                <i class="fas fa-circle" style="font-size: 8px;"></i> ${statusText}
              </span>
              <span class="card-rating">
                <i class="fas fa-star" style="color: #fbbf24;"></i> ${club.rating || '4.0'}
              </span>
            </div>
            <div class="card-content">
              <h3 class="card-title">${club.club_name}</h3>
              <p class="card-location">
                <i class="fas fa-map-marker-alt"></i> ${club.location || 'Pune'}
              </p>
              <p class="card-desc">${club.description || 'Premium nightlife experience'}</p>
            </div>
          </div>
        `;
      }).join('');
    }
function openClub(clubId) {
  window.location.href = `restaurant_detail.html?vendor_id=${clubId}`;
}

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', filterClubs);

    function filterClubs() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allClubs.filter(club => 
        (club.club_name || '').toLowerCase().includes(query) ||
        (club.location || '').toLowerCase().includes(query)
      );
      renderClubs(filtered);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadClubs);
  </script>

</body>
</html>
